<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma-DOS</title>

<link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
<script src="https://v8.js-dos.com/latest/js-dos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}

#dos {
  width: 100%;
  height: 100%;
}

#crt {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
}
#crt::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.45) 100%);
}

#boot {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #000;
  color: #33ff33;
  font-family: 'Courier New', monospace;
  font-size: clamp(10px, 1.4vw, 14px);
  line-height: 1.65;
  padding: clamp(14px, 3vw, 40px) clamp(18px, 4vw, 56px);
  text-shadow: 0 0 5px rgba(51,255,51,0.4);
  overflow: hidden;
}
#boot.gone { display: none; }

#err {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: #000090;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: clamp(10px, 1.3vw, 14px);
  padding: 40px;
  text-align: center;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  line-height: 1.9;
}
#err.show { display: flex; }

@keyframes crt-on {
  0%   { opacity: 0 }
  5%   { opacity: 1; filter: brightness(5) }
  8%   { opacity: 0.1 }
  13%  { opacity: 1; filter: brightness(1.8) }
  18%  { opacity: 0.5 }
  24%  { opacity: 1; filter: brightness(1) }
}
body { animation: crt-on 0.9s ease-out both; }
</style>
</head>
<body>

<div id="crt"></div>
<div id="boot"><div id="blog"></div></div>

<div id="err">
  <div style="font-size:1.5em;color:#ff5555">&#9888; SYSTEM ERROR</div>
  <div id="errmsg" style="max-width:480px"></div>
  <div style="color:#aaa;font-size:0.85em;max-width:500px">
    Ligma-DOS requires an HTTP server — file:// will not work.<br>
    Run: <span style="color:#ffff55">python3 -m http.server 8080</span><br>
    Open: <span style="color:#55ff55">http://localhost:8080/ligma-dos.html</span>
  </div>
</div>

<div id="dos" style="width:100%;height:100%"></div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function animateBoot() {
  const log = document.getElementById('blog');
  const ln = (text, color) => {
    const d = document.createElement('div');
    d.textContent = text;
    if (color) d.style.color = color;
    log.appendChild(d);
  };

  const lines = [
    ['',                                                               null,      0  ],
    ['Ligma-DOS BIOS v6.9  Copyright (C) Ligma Corp. 1985-1994',      '#aaffaa', 60 ],
    ['',                                                               null,      20 ],
    ['CPU  : Intel 80486DX2 @ 66 MHz',                                '#33ff33', 100],
    ['RAM  : Testing 640K Base Memory ... OK',                         '#33ff33', 260],
    ['RAM  : Testing 15360K Extended Memory ... OK',                   '#33ff33', 440],
    ['',                                                               null,      40 ],
    ['HIMEM is testing extended memory...',                            '#1c991c', 180],
    ['HIMEM is testing extended memory...done.',                       '#1c991c', 360],
    ['',                                                               null,      30 ],
    ['DEVICEHIGH=C:\\DOS\\LIGMA.SYS',                                  '#1c991c', 110],
    ['DEVICEHIGH=C:\\DOS\\ANSI.SYS',                                   '#1c991c', 80 ],
    ['',                                                               null,      40 ],
    ['Starting Ligma-DOS...',                                          '#ffff55', 260],
    ['',                                                               null,      70 ],
    ['Ligma-DOS  Version 6.9',                                         '#aaffaa', 110],
    ['Copyright (C) Ligma Corp. 1985-1994. All rights reserved.',      '#aaffaa', 80 ],
    ['',                                                               null,      30 ],
    ['SET PATH=C:\\DOS;C:\\GAMES',                                      '#1c991c', 60 ],
    ['SET PROMPT=$P$G',                                                '#1c991c', 60 ],
    ['',                                                               null,      160],
  ];

  for (const [t, c, d] of lines) { await sleep(d); ln(t, c); }
}

async function buildBundle() {
  const zip = new JSZip();

  const conf = [
    '[sdl]',
    'fullscreen=false',
    'output=opengl',   // <-- opengl not surface; surface = black screen in WASM
    'autolock=false',
    '',
    '[dosbox]',
    'machine=svga_s3',
    'memsize=16',
    '',
    '[render]',
    'frameskip=0',
    'aspect=true',
    'scaler=none',
    '',
    '[cpu]',
    'core=auto',
    'cputype=auto',
    'cycles=auto',
    '',
    '[mixer]',
    'nosound=false',
    'rate=22050',
    '',
    '[sblaster]',
    'sbtype=sb16',
    'sbbase=220',
    'irq=7',
    'dma=1',
    '',
    '[dos]',
    'xms=true',
    'ems=true',
    'umb=true',
    '',
    '[autoexec]',
    '@echo off',
    'cls',
    'echo.',
    'echo  ================================',
    'echo   L I G M A - D O S   v6.9',
    'echo  ================================',
    'echo.',
    'echo  Games are in C:\\GAMES',
    'echo  Type HELP for commands.',
    'echo.',
  ].join('\n');

  zip.file('.jsdos/dosbox.conf', conf);
  zip.file('.jsdos/jsdos.json', JSON.stringify({
    version: '8.xx',
    build: 'dosbox',
    options: {}
  }));

  return zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
}

async function main() {
  const [, bundle] = await Promise.all([animateBoot(), buildBundle()]);

  document.getElementById('boot').classList.add('gone');

  const url = URL.createObjectURL(bundle);

  try {
    Dos(document.getElementById('dos'), { url });
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  } catch(e) {
    document.getElementById('errmsg').textContent = e.message;
    document.getElementById('err').classList.add('show');
  }
}

main();
</script>
</body>
</html>
